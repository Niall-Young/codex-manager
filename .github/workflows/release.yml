name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release metadata
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-manual}"
          VERSION="${TAG_NAME#v}"
          if [[ "$TAG_NAME" == "manual" || -z "$VERSION" ]]; then
            VERSION="0.1.0"
          fi

          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_BUILD=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "ZIP_NAME=CodexManager-${VERSION}-macOS.zip" >> "$GITHUB_ENV"

      - name: Build release archive
        shell: bash
        run: bash scripts/package-app.sh

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: .build/${{ env.ZIP_NAME }}
